<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 374" width="700">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
    <pattern id="opt" patternUnits="userSpaceOnUse" width="8" height="8">
      <line x1="0" y1="8" x2="8" y2="0" stroke="#8888" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- outer card -->
  <rect x="28" y="44" width="644" height="310" rx="5" fill="white" stroke="#d4d2ca" stroke-width="1" filter="url(#sh)"/>

  <!-- title bar -->
  <rect x="28" y="44" width="644" height="34" rx="5" fill="#222220"/>
  <rect x="28" y="60" width="644" height="18" fill="#222220"/>
  <text x="350" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#e8e6df" letter-spacing="2.5">SHRD SECTION LAYOUT</text>

  <!-- row 1 — ShardHeader -->
  <rect x="28" y="78" width="6" height="56" fill="#1b6b7b"/>
  <rect x="34" y="78" width="638" height="56" fill="#edf6f8"/>
  <text x="52" y="103" font-size="13" font-weight="600" fill="#1b6b7b">ShardHeader</text>
  <text x="660" y="97" text-anchor="end" font-size="11" fill="#5a9aa8">128 B</text>
  <text x="52" y="120" font-size="10" fill="#527880">magic · shard_id · n_genomes · codec · dict_size</text>
  <text x="52" y="132" font-size="10" fill="#527880">dir_offset · dict_offset · blob_area_offset · checkpoint_area_offset</text>
  <line x1="34" y1="134" x2="672" y2="134" stroke="#dce9eb" stroke-width="1"/>

  <!-- row 2 — GenomeDirEntry[] -->
  <rect x="28" y="134" width="6" height="60" fill="#2d6e50"/>
  <rect x="34" y="134" width="638" height="60" fill="#edf5f0"/>
  <text x="52" y="159" font-size="13" font-weight="600" fill="#2d6e50">GenomeDirEntry[n_genomes]</text>
  <text x="660" y="153" text-anchor="end" font-size="11" fill="#4a8a68">64 B × n</text>
  <text x="52" y="176" font-size="10" fill="#3d6a50">genome_id · oph_fingerprint · blob_offset · blob_len_cmp · blob_len_raw</text>
  <text x="52" y="188" font-size="10" fill="#3d6a50">checkpoint_idx · n_checkpoints   —   sorted by oph_fingerprint</text>
  <line x1="34" y1="194" x2="672" y2="194" stroke="#dce9e3" stroke-width="1"/>

  <!-- row 3 — zstd dictionary (optional, hatched) -->
  <rect x="28" y="194" width="6" height="46" fill="#777770"/>
  <rect x="34" y="194" width="638" height="46" fill="url(#opt)" fill-opacity="0.5"/>
  <rect x="34" y="194" width="638" height="46" fill="#f4f3ef" fill-opacity="0.7"/>
  <rect x="34" y="194" width="638" height="46" fill="none" stroke="#aaa89a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="52" y="219" font-size="13" font-weight="600" fill="#555550">zstd dictionary</text>
  <text x="660" y="213" text-anchor="end" font-size="11" fill="#888880">dict_size B</text>
  <text x="52" y="232" font-size="10" fill="#777770">optional shared dictionary (codecs ZSTD_DICT and REF_DICT only)</text>
  <text x="52" y="235" font-size="9" fill="#999990" font-style="italic">  optional</text>
  <line x1="34" y1="240" x2="672" y2="240" stroke="#e0dfd8" stroke-width="1"/>

  <!-- row 4 — Blob area -->
  <rect x="28" y="240" width="6" height="68" fill="#5b3d8a"/>
  <rect x="34" y="240" width="638" height="68" fill="#f2eef8"/>
  <text x="52" y="264" font-size="13" font-weight="600" fill="#5b3d8a">Blob area</text>
  <text x="660" y="258" text-anchor="end" font-size="11" fill="#7a6aaa">variable</text>
  <text x="52" y="280" font-size="10" fill="#5a4a78">blob[0] · blob[1] · blob[2] · ...</text>
  <text x="52" y="294" font-size="10" fill="#7a6a98">each blob is independently decompressible; offsets in GenomeDirEntry</text>
  <!-- blob sub-boxes -->
  <rect x="52" y="298" width="52" height="4" rx="1" fill="#5b3d8a55"/>
  <rect x="110" y="298" width="66" height="4" rx="1" fill="#5b3d8a55"/>
  <rect x="182" y="298" width="40" height="4" rx="1" fill="#5b3d8a55"/>
  <rect x="228" y="298" width="80" height="4" rx="1" fill="#5b3d8a55"/>
  <rect x="314" y="298" width="30" height="4" rx="1" fill="#5b3d8a55"/>
  <rect x="350" y="298" width="60" height="4" rx="1" fill="#5b3d8a55"/>
  <line x1="34" y1="308" x2="672" y2="308" stroke="#e2dced" stroke-width="1"/>

  <!-- row 5 — CheckpointEntry[] (optional) -->
  <rect x="28" y="308" width="6" height="46" fill="#777770"/>
  <rect x="34" y="308" width="638" height="46" fill="url(#opt)" fill-opacity="0.5"/>
  <rect x="34" y="308" width="638" height="46" fill="#f4f3ef" fill-opacity="0.7"/>
  <rect x="34" y="308" width="638" height="46" fill="none" stroke="#aaa89a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="52" y="333" font-size="13" font-weight="600" fill="#555550">CheckpointEntry[]</text>
  <text x="660" y="327" text-anchor="end" font-size="11" fill="#888880">16 B × n</text>
  <text x="52" y="346" font-size="10" fill="#777770">symbol_offset · block_offset  —  enables sub-genome slice without full decompress</text>
  <text x="52" y="350" font-size="9" fill="#999990" font-style="italic">  optional</text>
</svg>
