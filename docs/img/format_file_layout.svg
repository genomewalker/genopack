<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 354" width="700">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- outer card -->
  <rect x="28" y="44" width="644" height="290" rx="5" fill="white" stroke="#d4d2ca" stroke-width="1" filter="url(#sh)"/>

  <!-- title bar -->
  <rect x="28" y="44" width="644" height="34" rx="5" fill="#222220"/>
  <rect x="28" y="60" width="644" height="18" fill="#222220"/>
  <text x="350" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#e8e6df" letter-spacing="2.5">.GPK FILE LAYOUT</text>

  <!-- row 1 — FileHeader -->
  <rect x="28" y="78" width="6" height="56" fill="#1b6b7b"/>
  <rect x="34" y="78" width="638" height="56" fill="#edf6f8"/>
  <text x="52" y="103" font-size="13" font-weight="600" fill="#1b6b7b">FileHeader</text>
  <text x="660" y="97" text-anchor="end" font-size="11" fill="#5a9aa8">128 B</text>
  <text x="52" y="120" font-size="10" fill="#527880">magic · version_major · version_minor · uuid · created_ts · generation</text>
  <line x1="34" y1="134" x2="672" y2="134" stroke="#dce9eb" stroke-width="1"/>

  <!-- row 2 — SHRD × N -->
  <rect x="28" y="134" width="6" height="70" fill="#2d6e50"/>
  <rect x="34" y="134" width="638" height="70" fill="#edf5f0"/>
  <text x="52" y="158" font-size="13" font-weight="600" fill="#2d6e50">SHRD × N</text>
  <text x="660" y="152" text-anchor="end" font-size="11" fill="#4a8a68">variable</text>
  <text x="52" y="172" font-size="10" fill="#3d6a50">compressed genome shards — old generations untouched on append</text>
  <!-- generation sub-boxes -->
  <rect x="52" y="178" width="136" height="18" rx="2" fill="#2d6e5022" stroke="#2d6e50" stroke-width="1"/>
  <text x="120" y="190" text-anchor="middle" font-size="9" fill="#1e4d38">generation 1</text>
  <rect x="196" y="178" width="136" height="18" rx="2" fill="#2d6e5022" stroke="#2d6e50" stroke-width="1"/>
  <text x="264" y="190" text-anchor="middle" font-size="9" fill="#1e4d38">generation 2</text>
  <rect x="340" y="178" width="72" height="18" rx="2" fill="#2d6e5011" stroke="#2d6e50" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="376" y="190" text-anchor="middle" font-size="9" fill="#3d6a50">· · ·</text>
  <line x1="34" y1="204" x2="672" y2="204" stroke="#dce9e3" stroke-width="1"/>

  <!-- row 3 — Index sections -->
  <rect x="28" y="204" width="6" height="68" fill="#5b3d8a"/>
  <rect x="34" y="204" width="638" height="68" fill="#f2eef8"/>
  <text x="52" y="228" font-size="13" font-weight="600" fill="#5b3d8a">Index sections</text>
  <text x="660" y="222" text-anchor="end" font-size="11" fill="#7a6aaa">variable</text>
  <text x="52" y="244" font-size="10" fill="#5a4a78">CATL · GIDX · ACCX · CIDX · TAXN · TXDB · KMRX · HNSW · TOMB</text>
  <text x="52" y="260" font-size="10" fill="#7a6a98">new fragment per generation; merged at read time</text>
  <line x1="34" y1="272" x2="672" y2="272" stroke="#e2dced" stroke-width="1"/>

  <!-- row 4 — TOC -->
  <rect x="28" y="272" width="6" height="46" fill="#8b5e1a"/>
  <rect x="34" y="272" width="638" height="46" fill="#f8f3ea"/>
  <text x="52" y="298" font-size="13" font-weight="600" fill="#8b5e1a">TOC</text>
  <text x="660" y="292" text-anchor="end" font-size="11" fill="#aa8840">variable</text>
  <text x="52" y="312" font-size="10" fill="#7a6030">zstd-compressed array of SectionDesc records (one per section)</text>
  <line x1="34" y1="318" x2="672" y2="318" stroke="#ede3cc" stroke-width="1"/>

  <!-- row 5 — TailLocator -->
  <rect x="28" y="318" width="6" height="16" fill="#1b6b7b"/>
  <rect x="34" y="318" width="638" height="16" fill="#edf6f8"/>
  <!-- bottom radius clip -->
  <rect x="28" y="326" width="6" height="8" fill="#1b6b7b"/>
  <rect x="34" y="326" width="638" height="8" fill="#edf6f8"/>
  <rect x="28" y="334" width="644" height="0" rx="0" fill="transparent"/>
  <text x="52" y="330" font-size="11" font-weight="600" fill="#1b6b7b">TailLocator</text>
  <text x="386" y="330" font-size="10" fill="#527880">fixed footer at EOF · points to TOC offset</text>
  <text x="660" y="330" text-anchor="end" font-size="11" fill="#5a9aa8">64 B</text>

  <!-- label arrows on right side -->
  <text x="682" y="109" font-size="9" fill="#aaa8a0">header</text>
  <text x="682" y="170" font-size="9" fill="#aaa8a0">data</text>
  <text x="682" y="240" font-size="9" fill="#aaa8a0">index</text>
  <text x="682" y="297" font-size="9" fill="#aaa8a0">toc</text>
  <text x="682" y="328" font-size="9" fill="#aaa8a0">footer</text>
</svg>
