<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 270" width="700">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- outer card -->
  <rect x="28" y="44" width="644" height="206" rx="5" fill="white" stroke="#d4d2ca" stroke-width="1" filter="url(#sh)"/>

  <!-- title bar -->
  <rect x="28" y="44" width="644" height="34" rx="5" fill="#222220"/>
  <rect x="28" y="60" width="644" height="18" fill="#222220"/>
  <text x="350" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#e8e6df" letter-spacing="2.5">CATL SECTION LAYOUT</text>

  <!-- row 1 — CatlHeader -->
  <rect x="28" y="78" width="6" height="50" fill="#1b6b7b"/>
  <rect x="34" y="78" width="638" height="50" fill="#edf6f8"/>
  <text x="52" y="103" font-size="13" font-weight="600" fill="#1b6b7b">CatlHeader</text>
  <text x="660" y="97" text-anchor="end" font-size="11" fill="#5a9aa8">32 B</text>
  <text x="52" y="120" font-size="10" fill="#527880">magic · n_rows · n_groups · stats_offset · rows_offset</text>
  <line x1="34" y1="128" x2="672" y2="128" stroke="#dce9eb" stroke-width="1"/>

  <!-- row 2 — RowGroupStatsV2 -->
  <rect x="28" y="128" width="6" height="66" fill="#8b5e1a"/>
  <rect x="34" y="128" width="638" height="66" fill="#f8f3ea"/>
  <text x="52" y="152" font-size="13" font-weight="600" fill="#8b5e1a">RowGroupStatsV2[n_groups]</text>
  <text x="660" y="146" text-anchor="end" font-size="11" fill="#aa8840">72 B × n</text>
  <text x="52" y="168" font-size="10" fill="#7a6030">min_oph · max_oph · min_completeness · max_completeness</text>
  <text x="52" y="182" font-size="10" fill="#7a6030">min_genome_length · max_genome_length</text>
  <!-- pushdown badge -->
  <rect x="494" y="158" width="160" height="20" rx="10" fill="#8b5e1a22" stroke="#8b5e1a" stroke-width="1"/>
  <text x="574" y="172" text-anchor="middle" font-size="9" fill="#6a4010">predicate pushdown</text>
  <text x="52" y="188" font-size="10" fill="#9a8040">scans skip entire row groups without reading GenomeMeta rows</text>
  <line x1="34" y1="194" x2="672" y2="194" stroke="#ede3cc" stroke-width="1"/>

  <!-- row 3 — GenomeMeta -->
  <rect x="28" y="194" width="6" height="60" fill="#5b3d8a"/>
  <rect x="34" y="194" width="638" height="60" fill="#f2eef8"/>
  <text x="52" y="219" font-size="13" font-weight="600" fill="#5b3d8a">GenomeMeta[n_rows]</text>
  <text x="660" y="213" text-anchor="end" font-size="11" fill="#7a6aaa">72 B × n</text>
  <text x="52" y="235" font-size="10" fill="#5a4a78">genome_id · oph_fingerprint · completeness · contamination</text>
  <text x="52" y="248" font-size="10" fill="#5a4a78">genome_length · n_contigs · shard_id</text>
  <!-- sorted badge -->
  <rect x="494" y="224" width="160" height="20" rx="10" fill="#5b3d8a22" stroke="#5b3d8a" stroke-width="1"/>
  <text x="574" y="238" text-anchor="middle" font-size="9" fill="#3a2060">sorted by oph_fingerprint</text>
</svg>
